<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <!-- Subtle dot grid -->
  <g fill="#312E81" opacity="0.3">
    <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="160" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="200" cy="80" r="1.5"/>
    <circle cx="1080" cy="560" r="1.5"/><circle cx="1120" cy="560" r="1.5"/><circle cx="1160" cy="560" r="1.5"/><circle cx="1200" cy="560" r="1.5"/><circle cx="1240" cy="560" r="1.5"/>
    <circle cx="1080" cy="600" r="1.5"/><circle cx="1120" cy="600" r="1.5"/><circle cx="1160" cy="600" r="1.5"/><circle cx="1200" cy="600" r="1.5"/><circle cx="1240" cy="600" r="1.5"/>
  </g>
  <!-- Icon group (left side) -->
  <g transform="translate(100, 80) scale(0.9)">
    <!-- SD card base -->
    <path d="M80 310 L400 310 L400 430 Q400 445 385 445 L95 445 Q80 445 80 430 Z" fill="url(#baseGrad)"/>
    <rect x="115" y="330" width="45" height="7" rx="2" fill="#818CF8" opacity="0.6"/>
    <rect x="175" y="330" width="45" height="7" rx="2" fill="#818CF8" opacity="0.6"/>
    <rect x="235" y="330" width="45" height="7" rx="2" fill="#818CF8" opacity="0.6"/>
    <rect x="125" y="344" width="24" height="3" rx="1" fill="#A5B4FC" opacity="0.35"/>
    <rect x="160" y="344" width="24" height="3" rx="1" fill="#A5B4FC" opacity="0.35"/>
    <rect x="195" y="344" width="24" height="3" rx="1" fill="#A5B4FC" opacity="0.35"/>
    <rect x="230" y="344" width="24" height="3" rx="1" fill="#A5B4FC" opacity="0.35"/>
    <!-- File C -->
    <rect x="72" y="206" width="250" height="68" rx="10" fill="#FDE68A" stroke="#F59E0B" stroke-width="2.5"/>
    <rect x="72" y="206" width="56" height="26" rx="10" fill="#F59E0B"/>
    <text x="87" y="226" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="white">C</text>
    <rect x="96" y="246" width="160" height="7" rx="3.5" fill="#FCD34D" opacity="0.7"/>
    <rect x="96" y="260" width="110" height="7" rx="3.5" fill="#FCD34D" opacity="0.5"/>
    <!-- File B -->
    <rect x="72" y="118" width="250" height="68" rx="10" fill="#BBF7D0" stroke="#22C55E" stroke-width="2.5"/>
    <rect x="72" y="118" width="56" height="26" rx="10" fill="#22C55E"/>
    <text x="87" y="138" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="white">B</text>
    <rect x="96" y="158" width="160" height="7" rx="3.5" fill="#86EFAC" opacity="0.7"/>
    <rect x="96" y="172" width="110" height="7" rx="3.5" fill="#86EFAC" opacity="0.5"/>
    <!-- File A -->
    <rect x="72" y="30" width="250" height="68" rx="10" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2.5"/>
    <rect x="72" y="30" width="56" height="26" rx="10" fill="#3B82F6"/>
    <text x="87" y="50" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="white">A</text>
    <rect x="96" y="70" width="160" height="7" rx="3.5" fill="#93C5FD" opacity="0.7"/>
    <rect x="96" y="84" width="110" height="7" rx="3.5" fill="#93C5FD" opacity="0.5"/>
    <!-- Sort arrow -->
    <path d="M365 60 L365 260" stroke="#A78BFA" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 7"/>
    <polygon points="351,250 365,278 379,250" fill="#A78BFA"/>
    <text x="348" y="46" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#C4B5FD">A</text>
    <text x="350" y="306" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#C4B5FD">Z</text>
  </g>
  <!-- Title text (right side) -->
  <text x="620" y="260" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="bold" fill="#E0E7FF" letter-spacing="-2">FatSorter</text>
  <!-- Tagline -->
  <text x="620" y="320" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#818CF8">Sort FAT directory entries alphabetically</text>
  <!-- Subtitle -->
  <text x="620" y="370" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6366F1" opacity="0.7">for embedded devices, SD cards, and USB drives</text>
  <!-- Platform badges -->
  <g transform="translate(620, 410)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#312E81"/>
    <text x="40" y="20" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle">Windows</text>
    <rect x="92" y="0" width="66" height="30" rx="6" fill="#312E81"/>
    <text x="125" y="20" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle">macOS</text>
    <rect x="170" y="0" width="62" height="30" rx="6" fill="#312E81"/>
    <text x="201" y="20" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle">Linux</text>
  </g>
</svg>