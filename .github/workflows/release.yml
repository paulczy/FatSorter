name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release

  publish:
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x86
          - win-x64
          - win-arm64
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish ${{ matrix.rid }}
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $outputPath = Join-Path $PWD 'publish/${{ matrix.rid }}'

          dotnet publish ./src/FatSorter/FatSorter.csproj `
            --configuration Release `
            --runtime '${{ matrix.rid }}' `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$version `
            --output $outputPath

      - name: Package ${{ matrix.rid }}
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $packageRoot = Join-Path $PWD 'release-assets'
          $rid = '${{ matrix.rid }}'
          $archivePath = Join-Path $packageRoot "FatSorter-$version-$rid.zip"

          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive -Path "publish/$rid/*" -DestinationPath $archivePath

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: release-assets/*.zip

  create-release:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="FatSorter ${tag}"

          mapfile -t assets < <(find release-assets -type f -name '*.zip' | sort)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$title" \
              --generate-notes \
              --verify-tag
          fi
